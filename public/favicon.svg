<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Green circle background -->
  <circle cx="32" cy="32" r="32" fill="#2d6a4f"/>
  <!-- Subtle lighter inner ring for depth -->
  <circle cx="32" cy="32" r="28" fill="none" stroke="#52b788" stroke-width="1" opacity="0.3"/>
  <!-- White "V" letter -->
  <path d="M20 16 L32 48 L44 16" stroke="white" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Small dot above the V to suggest a child/head -->
  <circle cx="32" cy="11" r="3" fill="white" opacity="0.9"/>
</svg>
